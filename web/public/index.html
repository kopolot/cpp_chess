<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cpp_chess</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <h1>cpp_chess</h1>
        <p class="subtitle">AI, lokalnie albo online z losowym przeciwnikiem</p>
      </header>

      <section class="panel status-panel">
        <div id="turn" class="status-line">Ładowanie…</div>
        <div id="message" class="status-line message"></div>
        <div id="hint" class="status-line hint"></div>
        <div id="ai-info" class="status-line hint"></div>
        <div id="lobby-info" class="status-line hint"></div>
      </section>

      <section class="board-wrap">
        <div id="board" class="board" aria-label="Szachownica"></div>
      </section>

      <section class="panel settings">
        <label class="setting">
          Tryb
          <select id="mode">
            <option value="ai" selected>Przeciw AI</option>
            <option value="local">Lokalnie (2 graczy)</option>
            <option value="online">Online — losowy przeciwnik</option>
          </select>
        </label>
        <label class="setting" id="difficulty-wrap">
          Poziom AI
          <select id="difficulty">
            <option value="1">Łatwy</option>
            <option value="2" selected>Średni</option>
            <option value="3">Trudny</option>
          </select>
        </label>
        <label class="setting" id="player-color-wrap">
          Twój kolor (AI)
          <select id="player-color">
            <option value="white" selected>Białe</option>
            <option value="black">Czarne</option>
          </select>
        </label>
        <label class="setting" id="name-wrap">
          Nick
          <input id="player-name" type="text" maxlength="32" placeholder="Gracz" />
        </label>
      </section>

      <section class="panel controls">
        <button id="new-game" type="button">Nowa gra</button>
        <button id="find-opponent" type="button" class="secondary">Szukaj przeciwnika</button>
        <button id="cancel-search" type="button" class="secondary hidden">Anuluj szukanie</button>
        <button id="reset-game" type="button">Reset</button>
      </section>

      <section id="promotion" class="panel promotion hidden">
        <p>Wybierz figurę promocji:</p>
        <div class="promotion-buttons">
          <button type="button" data-piece="q">♕ Hetman</button>
          <button type="button" data-piece="r">♖ Wieża</button>
          <button type="button" data-piece="b">♗ Goniec</button>
          <button type="button" data-piece="n">♘ Skoczek</button>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
